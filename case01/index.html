<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>おおとり遊園地</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand" data-page="home">おおとり遊園地</div>
    <nav class="nav">
      <button data-page="home">ホーム</button>
      <button data-page="map">園内マップ</button>
      <button data-page="attractions">アトラクション</button>
      <button data-page="schedule">ショースケジュール</button>
      <button data-page="news">お知らせ</button>
      <button data-page="contact">お問い合わせ</button>
    </nav>
    <form id="searchForm" class="search-box">
      <input id="searchInput" type="search" placeholder="サイト内検索" autocomplete="off" />
      <button type="submit">検索</button>
    </form>
  </header>

  <main id="page" class="page"></main>

  <section id="chatPanel" class="chat-panel" aria-label="森高宵とのメッセージ">
    <div class="chat-head">
      <div>
        <div class="chat-name">森高 宵</div>
        <div id="routeLabel" class="chat-status">共通ルート</div>
      </div>
      <button id="chatToggle" class="chat-toggle">−</button>
    </div>
    <div id="chatLog" class="chat-log"></div>
    <form id="chatForm" class="chat-form">
      <input id="chatInput" type="text" placeholder="メッセージを入力" autocomplete="off" />
      <button type="submit">送信</button>
    </form>
  </section>

  <footer class="site-footer">
    <span id="pageNumber">1 / 18</span>
    <span>このWebサイトの内容はフィクションであり、実在の人物・団体とは一切関係がありません。</span>
  </footer>

  <script src="data.js"></script>
  <script src="chat.js"></script>
  <script src="script.js"></script>
</body>
</html>
