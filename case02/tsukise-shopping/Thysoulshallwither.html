<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>？？？？？</title>
<style>
:root{
  --bg:#f4efe6;
  --paper:#fffdf8;
  --ink:#292522;
  --muted:#877a70;
  --line:#d8cbbd;
  --accent:#7a251f;
  --accent-dark:#4d1714;
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  color:var(--ink);
  background:
    radial-gradient(circle at 18% 12%,rgba(122,37,31,.04),transparent 27%),
    repeating-linear-gradient(0deg,rgba(73,56,44,.018) 0 1px,transparent 1px 4px),
    var(--bg);
  font-family:"Yu Mincho","Hiragino Mincho ProN","Times New Roman",serif;
  line-height:2;
}
.hidden-page{
  width:min(780px,calc(100% - 40px));
  margin:0 auto;
  padding:78px 0 0;
}
.archive-mark{
  margin:0 0 28px;
  color:#9a8c80;
  font:700 .67rem/1.4 Consolas,monospace;
  letter-spacing:.16em;
}
.message{
  position:relative;
  padding:48px 52px 54px;
  background:var(--paper);
  border:1px solid var(--line);
  box-shadow:0 18px 46px rgba(65,47,36,.11);
}
.message:before,
.message:after{
  content:"";
  position:absolute;
  width:28px;
  height:28px;
  border-color:#c5b4a5;
  pointer-events:none;
}
.message:before{
  left:13px;top:13px;
  border-left:1px solid;
  border-top:1px solid;
}
.message:after{
  right:13px;bottom:13px;
  border-right:1px solid;
  border-bottom:1px solid;
}
.message h1{
  margin:0 0 40px;
  font-size:1.1rem;
  font-weight:500;
  letter-spacing:.45em;
  color:#564b44;
}
.message p{
  margin:0 0 30px;
  font-size:1rem;
}
.message .last{
  margin-top:70px;
  margin-bottom:0;
}
.delete-area{
  min-height:74vh;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:90px 0 120px;
}
.delete-button{
  appearance:none;
  border:0;
  border-bottom:1px solid #a46c67;
  padding:10px 4px;
  color:#8f4a45;
  background:transparent;
  font:500 .92rem/1.5 inherit;
  letter-spacing:.12em;
  cursor:pointer;
  transition:.2s ease;
}
.delete-button:hover,
.delete-button:focus-visible{
  color:#b3221a;
  border-color:#b3221a;
  outline:none;
}
.site-footer{
  border-top:1px solid #d9cec4;
  color:#8e8177;
  background:rgba(255,253,248,.55);
  font-size:.72rem;
}
.footer-inner{
  width:min(1180px,calc(100% - 40px));
  min-height:58px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}
.modal-backdrop{
  position:fixed;
  inset:0;
  z-index:100;
  display:grid;
  place-items:center;
  padding:20px;
  background:rgba(32,23,19,.72);
  backdrop-filter:blur(2px);
}
.modal-backdrop[hidden]{display:none}
.confirm-dialog{
  width:min(440px,100%);
  background:#fffaf4;
  border:1px solid #9d6b64;
  box-shadow:0 24px 70px rgba(0,0,0,.36);
}
.confirm-dialog header{
  padding:13px 18px;
  border-bottom:1px solid #d9c3bd;
  background:#6a221d;
  color:#fff8f2;
  font:700 .7rem/1.4 Consolas,monospace;
  letter-spacing:.14em;
}
.confirm-body{
  padding:34px 28px 28px;
  text-align:center;
}
.confirm-body p{
  margin:0 0 30px;
  font-size:1rem;
}
.confirm-actions{
  display:flex;
  justify-content:center;
  gap:14px;
}
.confirm-actions button{
  min-width:112px;
  padding:10px 18px;
  border:1px solid #cbbdb1;
  background:#f5eee7;
  color:#463d37;
  font:inherit;
  cursor:pointer;
}
.confirm-actions .yes{
  border-color:#8a3b35;
  background:#6c211c;
  color:#fff;
}
.confirm-actions button:hover{filter:brightness(.96)}
@media(max-width:600px){
  .hidden-page{width:min(100% - 24px,780px);padding-top:42px}
  .message{padding:30px 22px 36px}
  .message p{font-size:.94rem}
  .footer-inner{
    width:calc(100% - 24px);
    padding:14px 0;
    flex-direction:column;
    align-items:flex-start;
    gap:2px;
  }
}
</style>
</head>
<body data-page="63" data-root="../">

<main class="hidden-page">
  <p class="archive-mark">TSUKISE SHOPPING STREET / UNLISTED</p>

  <article class="message">


    <p>まさか、ここが見つかるなんてな。<br>
    よくダミーに引っかからなかったものだ。</p>

    <p>流石だよ。<br>
    ここのHPを悟られずに改造するのは大変だったというのに……。</p>

    <p>それにしても、本当に残念だ。<br>
    まぁでも、少し楽しかったよ。</p>

    <p class="last">次は、負けないからな。</p>
  </article>

  <div class="delete-area">
    <button class="delete-button" id="deletePageButton" type="button">ページを削除する</button>
  </div>
</main>

<script src="../common/js/footer.js"></script>

<div class="modal-backdrop" id="confirmModal" hidden>
  <section class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <header>DELETE PAGE</header>
    <div class="confirm-body">
      <p id="confirmTitle">本当にページを削除しますか？</p>
      <div class="confirm-actions">
        <button class="yes" id="confirmYes" type="button">はい</button>
        <button id="confirmNo" type="button">いいえ</button>
      </div>
    </div>
  </section>
</div>

<script>
(() => {
  const openButton = document.getElementById("deletePageButton");
  const modal = document.getElementById("confirmModal");
  const yesButton = document.getElementById("confirmYes");
  const noButton = document.getElementById("confirmNo");

  const openModal = () => {
    modal.hidden = false;
    noButton.focus();
  };

  const closeModal = () => {
    modal.hidden = true;
    openButton.focus();
  };

  openButton.addEventListener("click", openModal);
  noButton.addEventListener("click", closeModal);

  yesButton.addEventListener("click", () => {
    window.location.href = "../endings/end2.html";
  });

  modal.addEventListener("click", event => {
    if (event.target === modal) closeModal();
  });

  document.addEventListener("keydown", event => {
    if (event.key === "Escape" && !modal.hidden) closeModal();
  });
})();
</script>

</body>
</html>
